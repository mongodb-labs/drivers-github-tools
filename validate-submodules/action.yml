name: "Validate Submodules"
description: "Validates that submodule commits are on the upstream branch and do not regress from the target branch"

inputs:
  token:
    description: "GitHub token"
    required: true
  repository:
    description: "GitHub repository (owner/repo)"
    required: false
    default: ${{ github.repository }}
  pr-sha:
    description: "Head commit SHA of the PR"
    required: false
    default: ${{ github.event.pull_request.head.sha || github.sha }}
  base-ref:
    description: "Target branch name"
    required: false
    default: ${{ github.base_ref }}

runs:
  using: composite
  steps:
  - name: Validate submodule commits
    shell: bash
    env:
      REPO: ${{ inputs.repository }}
      PR_SHA: ${{ inputs.pr-sha }}
      BASE_REF: ${{ inputs.base-ref }}
      GH_TOKEN: ${{ inputs.token }}
    run: bash ${{ github.action_path }}/validate-submodules.sh
